<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will Tech Solutions</title>
    <style>
        body {
            background-color: #0a0e12;
            color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif;
            margin: 0 auto;
            padding: 10px;
            max-width: 500px;
            min-height: 100vh;
        }
        .header { text-align: center; color: #4fd1ed; font-size: 24px; margin-bottom: 15px; text-shadow: 0 0 10px #4fd1ed66; font-weight: bold; }
        .ticker-bar { display: flex; justify-content: space-around; font-size: 11px; border-bottom: 1px solid #1a222d; padding-bottom: 10px; margin-bottom: 10px; }
        .gold-txt { color: #ffd700; } .up { color: #00ff88; } .down { color: #ff4444; }
        
        .main-card {
            background: #111820;
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #1a222d;
        }
        .prediction-badge { background: #00ff8822; color: #00ff88; padding: 4px 8px; border-radius: 5px; float: right; font-weight: bold; font-size: 12px; border: 1px solid #00ff8844; }
        
        #chart {
            width: 100%;
            height: 180px;
            margin-top: 15px;
            border-radius: 8px;
            background-color: #0d1218; /* Garante fundo escuro */
        }

        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
        .card { background: #161d26; padding: 12px; border-radius: 10px; border: 1px solid #1a222d; }
        
        .auto-button {
            background: none; border: 1px solid #00ff88; color: #00ff88; border-radius: 10px;
            padding: 12px 5px; text-align: center; font-weight: bold; font-size: 10px;
            cursor: pointer; transition: 0.3s;
        }
        .active-trade { background: #00ff88 !important; color: #000 !important; box-shadow: 0 0 15px #00ff88; }
        .footer-status { color: #555; font-size: 10px; text-align: center; margin-top: 15px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="header">Will Tech Solutions</div>

    <div class="ticker-bar">
        <span>GOLD: <span id="top-gold-price" class="gold-txt">---</span></span>
        <span>BTC/USDT: <span id="top-btc-price" class="up">---</span></span>
    </div>

    <div class="main-card">
        <div><strong style="font-size: 14px;">BITCOIN (BTC)</strong> <span id="ia-prediction" class="prediction-badge">IA: --%</span></div>
        <div style="font-size: 24px; margin: 8px 0; font-weight: bold;">
            <span id="main-btc-price">$0.00</span> 
            <small id="main-btc-var" class="up" style="font-size: 12px; font-weight: normal;">0.00%</small>
        </div>
        <div id="chart"></div>
    </div>

    <div class="grid-container">
        <div class="card"><small style="color:#888">SOLANA (SOL)</small><br><span id="sol-data" class="up" style="font-weight:bold">---</span></div>
        <div class="card"><small style="color:#888">GOLD (PAXG)</small><br><span id="gold-data" class="gold-txt" style="font-weight:bold">---</span></div>
    </div>

    <h4 style="margin: 15px 0 10px 0; font-size: 12px; color: #888; text-transform: uppercase;">Autotrade Automation</h4>
    <div class="grid-container" style="grid-template-columns: 1fr 1fr 1fr;">
        <div id="btn-smc" class="auto-button">AUTO<br>SMC</div>
        <div id="btn-ob" class="auto-button">AUTO<br>ORDER BLOCK</div>
        <div id="btn-trend" class="auto-button">AUTO<br>TREND</div>
    </div>

    <div id="status-msg" class="footer-status">MONITORANDO ATIVOS...</div>

    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

    <script>
        const container = document.getElementById('chart');
        
        // CONFIGURAÇÃO DO GRÁFICO (DARK MODE)
        const chart = LightweightCharts.createChart(container, {
            layout: { 
                backgroundColor: '#0d1218', 
                textColor: '#d1d4dc',
                fontSize: 10
            },
            grid: { 
                vertLines: { color: '#161d26' }, 
                horzLines: { color: '#161d26' } 
            },
            rightPriceScale: { borderVisible: false },
            timeScale: { borderVisible: false },
            handleScroll: false,
            handleScale: false,
        });

        const lineSeries = chart.addLineSeries({ 
            color: '#00ff88', 
            lineWidth: 2,
            priceLineVisible: false,
            lastValueVisible: true
        });

        async function atualizarApp() {
            try {
                const response = await fetch('http://127.0.0.1:5000/dados');
                const dados = await response.json();

                if (dados["BTCUSDT"]) {
                    const btc = dados["BTCUSDT"];
                    const sol = dados["SOLUSDT"];
                    const gold = dados["PAXGUSDT"];

                    // Atualiza Textos
                    document.getElementById('top-btc-price').innerText = `$${btc.preco}`;
                    document.getElementById('main-btc-price').innerText = `$${btc.preco.toLocaleString()}`;
                    document.getElementById('main-btc-var').innerText = `${btc.variacao}%`;
                    document.getElementById('ia-prediction').innerText = `IA: ${btc.prob}%`;
                    
                    document.getElementById('sol-data').innerText = `$${sol.preco} (${sol.variacao}%)`;
                    document.getElementById('gold-data').innerText = `$${gold.preco} (${gold.variacao}%)`;
                    document.getElementById('top-gold-price').innerText = `$${gold.preco}`;

                    // Atualiza Gráfico
                    lineSeries.update({
                        time: Math.floor(Date.now() / 1000),
                        value: btc.preco
                    });

                    // Botões Neon conforme IA
                    if (btc.prob > 70) {
                        document.getElementById('btn-smc').classList.add('active-trade');
                        document.getElementById('status-msg').innerText = "OPORTUNIDADE DE COMPRA DETECTADA";
                        document.getElementById('status-msg').style.color = "#00ff88";
                    } else {
                        document.getElementById('btn-smc').classList.remove('active-trade');
                        document.getElementById('status-msg').innerText = "MONITORANDO MERCADO...";
                        document.getElementById('status-msg').style.color = "#555";
                    }
                }
            } catch (e) {
                console.log("Erro ao buscar dados:", e);
            }
        }

        // Ajuste de tamanho
        window.addEventListener('resize', () => {
            chart.applyOptions({ width: container.offsetWidth });
        });

        setInterval(atualizarApp, 2000);
        atualizarApp(); // Chama a primeira vez
    </script>
</body>
</html>
