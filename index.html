<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will Tech Solutions</title>
    <style>
        body {
            background-color: #06090c; /* Fundo ultra dark */
            color: #e0e0e0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0 auto;
            padding: 10px;
            max-width: 480px;
            min-height: 100vh;
        }
        .header { text-align: center; color: #4fd1ed; font-size: 22px; margin: 10px 0 15px 0; text-shadow: 0 0 12px rgba(79, 209, 237, 0.5); font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .ticker-bar { display: flex; justify-content: space-around; font-size: 10px; border-bottom: 1px solid #1a222d; padding-bottom: 10px; margin-bottom: 15px; color: #888; }
        .gold-txt { color: #ffd700; } .up { color: #00ff88; } .down { color: #ff4444; }
        
        .main-card {
            background: #0f141a;
            border-radius: 12px;
            padding: 16px;
            border: 1px solid #1c252e;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .prediction-badge { background: rgba(0, 255, 136, 0.1); color: #00ff88; padding: 4px 10px; border-radius: 6px; float: right; font-weight: bold; font-size: 11px; border: 1px solid rgba(0, 255, 136, 0.3); }
        
        #chart {
            width: 100%;
            height: 220px; /* Aumentado para melhor visualização */
            margin-top: 15px;
            border-radius: 6px;
            background-color: #0d1218;
            overflow: hidden;
            border: 1px solid #161d26;
        }

        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
        .card { background: #0f141a; padding: 12px; border-radius: 10px; border: 1px solid #1c252e; }
        .card small { color: #666; font-size: 10px; text-transform: uppercase; font-weight: bold; }
        
        .auto-button {
            background: rgba(0, 255, 136, 0.02); border: 1px solid #00ff88; color: #00ff88; border-radius: 8px;
            padding: 14px 5px; text-align: center; font-weight: bold; font-size: 10px;
            cursor: pointer; transition: all 0.3s ease; text-transform: uppercase;
        }
        .active-trade { background: #00ff88 !important; color: #000 !important; box-shadow: 0 0 20px rgba(0, 255, 136, 0.4); }
        .footer-status { color: #00ff88; font-size: 9px; text-align: center; margin-top: 20px; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="header">Will Tech Solutions</div>

    <div class="ticker-bar">
        <span>GOLD: <span id="top-gold-price" class="gold-txt">---</span></span>
        <span>BTC/USDT: <span id="top-btc-price" class="up">---</span></span>
    </div>

    <div class="main-card">
        <div><strong style="font-size: 13px; letter-spacing: 0.5px;">BITCOIN (BTC)</strong> <span id="ia-prediction" class="prediction-badge">IA: --%</span></div>
        <div style="font-size: 26px; margin: 10px 0; font-weight: bold; letter-spacing: -0.5px;">
            <span id="main-btc-price">$0.00</span> 
            <small id="main-btc-var" class="up" style="font-size: 12px; font-weight: normal; margin-left: 5px;">0.00%</small>
        </div>
        <div id="chart"></div>
    </div>

    <div class="grid-container">
        <div class="card"><small>SOLANA (SOL)</small><br><span id="sol-data" class="up" style="font-weight:bold; font-size: 14px;">---</span></div>
        <div class="card"><small>GOLD (PAXG)</small><br><span id="gold-data" class="gold-txt" style="font-weight:bold; font-size: 14px;">---</span></div>
    </div>

    <h4 style="margin: 20px 0 10px 0; font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 1px;">Autotrade Automation</h4>
    <div class="grid-container" style="grid-template-columns: 1fr 1fr 1fr;">
        <div id="btn-smc" class="auto-button">AUTO<br>SMC</div>
        <div id="btn-ob" class="auto-button">AUTO<br>ORDER BLOCK</div>
        <div id="btn-trend" class="auto-button">AUTO<br>TREND</div>
    </div>

    <div id="status-msg" class="footer-status">● MONITORANDO ATIVOS...</div>

    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

    <script>
        const container = document.getElementById('chart');
        
        // CONFIGURAÇÃO DO GRÁFICO CORRIGIDA PARA TEMA ESCURO
        const chart = LightweightCharts.createChart(container, {
            layout: { 
                background: { type: 'solid', color: '#0d1218' },
                textColor: '#707a8a',
                fontSize: 10
            },
            grid: { 
                vertLines: { color: '#161d26' }, 
                horzLines: { color: '#161d26' } 
            },
            rightPriceScale: { 
                borderVisible: false,
                scaleMargins: { top: 0.2, bottom: 0.2 }
            },
            timeScale: { 
                borderVisible: false,
                timeVisible: true,
                secondsVisible: false
            },
            crosshair: {
                vertLine: { color: '#2b3947', labelBackgroundColor: '#2b3947' },
                horzLine: { color: '#2b3947', labelBackgroundColor: '#2b3947' }
            },
            handleScroll: false,
            handleScale: false,
        });

        const lineSeries = chart.addLineSeries({ 
            color: '#00ff88', 
            lineWidth: 2,
            priceLineVisible: false,
            lastValueVisible: true,
            priceFormat: { type: 'price', precision: 2, minMove: 0.01 }
        });

        // Adiciona um efeito de gradiente abaixo da linha (opcional para estilo)
        const areaSeries = chart.addAreaSeries({
            topColor: 'rgba(0, 255, 136, 0.2)',
            bottomColor: 'rgba(0, 255, 136, 0.0)',
            lineColor: '#00ff88',
            lineWidth: 2,
        });

        async function atualizarApp() {
            try {
                const response = await fetch('http://127.0.0.1:5000/dados');
                const dados = await response.json();

                if (dados["BTCUSDT"]) {
                    const btc = dados["BTCUSDT"];
                    const sol = dados["SOLUSDT"];
                    const gold = dados["PAXGUSDT"];

                    // Atualiza Cabeçalho e BTC
                    document.getElementById('top-btc-price').innerText = `$${btc.preco.toLocaleString()}`;
                    document.getElementById('main-btc-price').innerText = `$${btc.preco.toLocaleString()}`;
                    document.getElementById('main-btc-var').innerText = `${btc.variacao}%`;
                    document.getElementById('ia-prediction').innerText = `IA: ${btc.prob}%`;
                    
                    // Cores de variação BTC
                    const btcVarEl = document.getElementById('main-btc-var');
                    btcVarEl.className = parseFloat(btc.variacao) >= 0 ? 'up' : 'down';

                    // Atualiza SOL e GOLD
                    document.getElementById('sol-data').innerText = `$${sol.preco} (${sol.variacao}%)`;
                    document.getElementById('gold-data').innerText = `$${gold.preco} (${gold.variacao}%)`;
                    document.getElementById('top-gold-price').innerText = `$${gold.preco.toLocaleString()}`;

                    // Atualiza Gráfico (Line e Area)
                    const timestamp = Math.floor(Date.now() / 1000);
                    const newData = { time: timestamp, value: btc.preco };
                    lineSeries.update(newData);
                    areaSeries.update(newData);

                    // Lógica de Botões baseada na Predição
                    if (btc.prob > 80) {
                        document.getElementById('btn-smc').classList.add('active-trade');
                        document.getElementById('status-msg').innerText = "● SINAL DE COMPRA FORTE DETECTADO";
                    } else {
                        document.getElementById('btn-smc').classList.remove('active-trade');
                        document.getElementById('status-msg').innerText = "● MONITORANDO ATIVOS...";
                    }
                }
            } catch (e) {
                console.error("Erro na conexão:", e);
                document.getElementById('status-msg').innerText = "● ERRO DE CONEXÃO COM BACKEND";
            }
        }

        window.addEventListener('resize', () => {
            chart.applyOptions({ width: container.offsetWidth });
        });

        setInterval(atualizarApp, 2000);
        atualizarApp();
    </script>
</body>
</html>
